name: CodeBadger (Joern) — Static Analysis

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Allow manual trigger

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codebadger:
    name: Code Property Graph Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      # ── Resolve Joern version for caching ──────────────────
      # Pinned to 4.0.500 — Joern 4.0.518 regressed with a deterministic
      # `NoSuchElementException: key not found: MethodRef[…]` inside
      # `ReachingDefPass` on this project's Kotlin CPG (caught on PR #45
      # once a cache-key rotation forced a fresh parse). The crash is an
      # upstream Joern Kotlin-frontend bug, not a finding against our code.
      # Revisit this pin when a later Joern release fixes it.
      - name: Resolve Joern version
        id: joern-version
        run: echo "version=4.0.500" >> "$GITHUB_OUTPUT"

      # ── Cache Joern CLI (~500 MB) ──────────────────────────
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        id: joern-cache
        with:
          path: joern-cli
          key: joern-cli-${{ steps.joern-version.outputs.version }}

      # joern-install.sh with no `--version` flag defaults to downloading the "latest"
      # release archive, ignoring which release tag the install-script itself came from.
      # Pass `--version=` explicitly so the version pin is actually honoured.
      - name: Install Joern
        if: steps.joern-cache.outputs.cache-hit != 'true'
        env:
          JOERN_VERSION: ${{ steps.joern-version.outputs.version }}
        run: |
          curl -fsSL "https://github.com/joernio/joern/releases/download/v${JOERN_VERSION}/joern-install.sh" \
            | bash -s -- --install-dir=. "--version=v${JOERN_VERSION}"

      - name: Add Joern to PATH
        run: echo "$PWD/joern-cli" >> "$GITHUB_PATH"

      # ── Cache CPG binaries (keyed on source hashes) ────────
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        id: cpg-kotlin-cache
        with:
          path: cpg-kotlin.bin
          key: cpg-kotlin-${{ steps.joern-version.outputs.version }}-${{ hashFiles('kompressor/src/commonMain/**', 'kompressor/src/androidMain/**') }}

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        id: cpg-swift-cache
        with:
          path: cpg-swift.bin
          key: cpg-swift-${{ steps.joern-version.outputs.version }}-${{ hashFiles('kompressor/src/iosMain/**') }}

      # ── Prepare source symlinks (always needed for suppression checks) ─
      - name: Create CPG input symlinks
        run: |
          mkdir -p .cpg-input-kotlin
          ln -s "$PWD/kompressor/src/commonMain/kotlin" .cpg-input-kotlin/commonMain
          ln -s "$PWD/kompressor/src/androidMain/kotlin" .cpg-input-kotlin/androidMain

      # ── Generate CPGs (skip on cache hit) ──────────────────
      - name: Generate CPG — Kotlin (commonMain + androidMain)
        if: steps.cpg-kotlin-cache.outputs.cache-hit != 'true'
        run: |
          joern-parse \
            --language kotlin \
            --output cpg-kotlin.bin \
            .cpg-input-kotlin

      - name: Generate CPG — Swift (iosMain)
        if: steps.cpg-swift-cache.outputs.cache-hit != 'true'
        run: |
          joern-parse \
            --language swiftsrc \
            --output cpg-swift.bin \
            kompressor/src/iosMain

      # ── Prepare config ─────────────────────────────────────
      - name: Convert CodeBadger config to JSON
        run: |
          if [ -f .codebadger.yml ]; then
            sudo snap install yq
            yq -o=json .codebadger.yml > .codebadger.json
          else
            echo '{}' > .codebadger.json
          fi

      # ── Run analysis (both steps run independently; fail deferred) ─
      - name: Run Joern analysis — Kotlin
        id: kotlin-analysis
        continue-on-error: true
        run: |
          mkdir -p build/reports/codebadger
          joern --script .github/joern/queries.sc \
            --param cpgFile=cpg-kotlin.bin \
            --param outputFile=build/reports/codebadger/kotlin-findings.json \
            --param configFile=.codebadger.json

      - name: Run Joern analysis — Swift
        id: swift-analysis
        if: always()
        continue-on-error: true
        run: |
          joern --script .github/joern/queries.sc \
            --param cpgFile=cpg-swift.bin \
            --param outputFile=build/reports/codebadger/swift-findings.json \
            --param configFile=.codebadger.json

      - name: Fail workflow on active findings
        if: always() && (steps.kotlin-analysis.outcome == 'failure' || steps.swift-analysis.outcome == 'failure')
        run: exit 1

      # ── Upload reports ─────────────────────────────────────
      - name: Upload CodeBadger reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: codebadger-report
          path: build/reports/codebadger/

      # ── Post summary to PR ─────────────────────────────────
      - name: Summarize findings
        if: always()
        run: |
          echo "## CodeBadger (Joern) Analysis Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          total=0
          suppressed=0
          has_table=false

          for report in build/reports/codebadger/*.json; do
            [ -f "$report" ] || continue
            name=$(basename "$report" .json)
            active=$(jq '[.[] | select(.suppressed != true)] | length' "$report" 2>/dev/null || echo 0)
            sup=$(jq '[.[] | select(.suppressed == true)] | length' "$report" 2>/dev/null || echo 0)
            total=$((total + active))
            suppressed=$((suppressed + sup))

            if [ "$active" -gt 0 ]; then
              has_table=true
              echo "### ${name}" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "| Severity | Rule | File | Line | Message |" >> "$GITHUB_STEP_SUMMARY"
              echo "|----------|------|------|------|---------|" >> "$GITHUB_STEP_SUMMARY"
              jq -r '.[] | select(.suppressed != true) | "| \(.severity) | `\(.type)` | `\(.file)` | \(.line) | \(.message) |"' \
                "$report" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
            fi
          done

          if [ "$has_table" = false ]; then
            echo "> **All clear** — no active findings." >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Total: ${total} active finding(s), ${suppressed} suppressed**" >> "$GITHUB_STEP_SUMMARY"

          if [ "$total" -gt 0 ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '> Add `// codebadger:suppress(<rule-id>)` above the flagged line to suppress false positives.' >> "$GITHUB_STEP_SUMMARY"
          fi
