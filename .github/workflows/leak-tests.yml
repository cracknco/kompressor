name: Leak tests (on-demand)

# CRA-50 â€” Android device-side leak test runner.
#
# Why this workflow is manual-only:
#   ADR-002 (docs/adr/002-decline-level-3-supply-chain.md) retired emulator-backed
#   PR CI for Kompressor: `connectedAndroidDeviceTest` on every PR was an expensive
#   belt-and-suspenders gate for an indie-OSS library, and the release-test +
#   iOS-sim PR gate already catch the regressions that matter. So this workflow
#   is `workflow_dispatch` only â€” maintainers run it before cutting a release or
#   when reviewing a PR that touches the Media3 Transformer / native buffer
#   lifecycle. The iOS half of CRA-50 runs on every PR via pr.yml's
#   `ios-leak-tests` job; Android parity is ensured by the test being wired into
#   androidDeviceTest so a local `./gradlew connectedAndroidDeviceTest` also runs it.
#
# When to trigger:
#   - Before cutting a release that touches `kompressor/src/androidMain/`.
#   - When a PR adds or reworks code in the `MediaCodec` / Media3 Transformer /
#     `BitmapFactory` paths.
#   - When investigating a reported OOM regression in a consumer app.
#
# No dynamic inputs and no untrusted `github.event.*` interpolation â€” everything
# below is static repo contents, so there is no command-injection surface.

on:
  workflow_dispatch:

concurrency:
  group: leak-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-leak-tests:
    name: Android leak tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          lfs: true
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      # KVM enable for nested virtualisation â€” required by the Android emulator.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-34-leak

      - name: Fetch fixtures
        run: ./scripts/fetch-fixtures.sh

      # API 34 is the highest level with a pre-built x86_64 Google Play image that
      # `reactivecircus/android-emulator-runner` boots reliably in under ~3 min;
      # if the library's `minSdk` ever rises above 34, bump here. The key lives
      # in `.github/workflows/leak-tests.yml` specifically so the sibling PR CI
      # doesn't pick up the emulator download cost.
      - name: Run CompressionLeakTest on emulator
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.37.0
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          # `--tests "co.crackn.kompressor.CompressionLeakTest"` scopes the device
          # test run to just the leak sentinel; running the full androidDeviceTest
          # suite on the runner's emulator would blow past the 60 min timeout.
          # LeakCanary still watches the compressor instances regardless of which
          # tests are selected.
          script: ./gradlew :kompressor:connectedAndroidDeviceTest --tests "co.crackn.kompressor.CompressionLeakTest"

      - name: Upload LeakCanary reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: android-leak-report
          path: |
            kompressor/build/reports/androidTests/
            kompressor/build/outputs/connected_android_test_additional_output/
