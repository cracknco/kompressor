name: PR checks

on:
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Ktlint ──────────────────────────────────────────────
  ktlint:
    name: Ktlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 21
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
      - name: Run Ktlint
        run: ./gradlew ktlintCheck

  # ── Detekt ──────────────────────────────────────────────
  detekt:
    name: Detekt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 21
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
      # `--no-configuration-cache`: Detekt's Gradle plugin currently can't serialise its
      # `__detektClasspath__` through Gradle 9.4's configuration cache and intermittently
      # fails with `error writing value of type 'DefaultConfigurableFileCollection'`. Until
      # the plugin gains support (see Detekt-gradle-plugin#7XXX), skip the cache for this
      # task only — the task itself is fast (< 1 min) so the cache wasn't buying us much.
      - name: Run Detekt
        run: ./gradlew detekt --no-configuration-cache
      - name: Upload Detekt report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: detekt-report
          path: build/reports/detekt/

  # ── Gitleaks ────────────────────────────────────────────
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ── Host tests, API check, coverage gate ─────────────────
  # Fast gate that runs on every PR without touching an emulator. Catches
  # regressions in commonTest + androidHostTest + public API in < 5 min.
  test:
    name: Tests & coverage (host)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 21
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
      - name: Run tests (Android host)
        run: ./gradlew testAndroidHostTest
      - name: API binary compatibility check
        run: ./gradlew apiCheck
      - name: Run Kover report
        run: ./gradlew koverXmlReport
      - name: Kover — quality gate
        run: ./gradlew koverVerify
      - name: Upload Kover report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: kover-report
          path: kompressor/build/reports/kover/

  # ── Android device tests (Firebase Test Lab) ─────────────
  # Runs the 47 `androidDeviceTest` tests on a real Pixel 5 (API 33) at
  # Google's physical-device farm. Replaced the previous ubuntu-latest
  # emulator job which had structural codec limitations on x86_64 system
  # images (Media3 Transformer ignored setBitrate, produced PCM-in-MP4
  # fallback). Physical hardware runs the same MediaCodec stack Kompressor
  # consumers will, so the tests validate real-world behaviour.
  #
  # FTL free tier covers ~1 physical device-hour/day. Our suite runs in
  # ~5-7 min, so ~8-12 PRs/day are free; overage is ~$1/device-hour.
  android-device-tests-ftl:
    name: Android device tests (Firebase Test Lab — Pixel 6 API 33)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 21
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}

      - name: Assemble device-test APK
        run: ./gradlew :kompressor:assembleAndroidDeviceTest

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2.2.1

      - name: Locate test APK
        id: apk
        run: |
          APK=$(find kompressor/build/outputs/apk -type f -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "::error::No APK produced by assembleAndroidDeviceTest"
            exit 1
          fi
          echo "path=$APK" >> "$GITHUB_OUTPUT"
          echo "Found APK: $APK ($(du -h "$APK" | cut -f1))"

      # Invoke Firebase Test Lab. Same APK is passed to both --app and --test
      # because :kompressor: is a library module; AGP produces a single
      # self-instrumenting test APK that bundles AndroidJUnitRunner.
      #
      # --results-bucket: we use a bucket we created and IAM-bound explicitly
      # (`test-lab-kompressor-ci`) rather than FTL's auto-generated bucket.
      # The auto-bucket is created with the FTL service's IAM, not our SA's,
      # leading to `403 storage.objects.create denied` on upload. An explicit
      # bucket with `storage.objectAdmin` granted to the admin-SDK SA sidesteps
      # that entirely.
      # Device choice: `oriole` (Pixel 6) because `redfin` (Pixel 5) is not available
      # at API 33 on FTL — the model/version matrix only supports redfin up to API 31.
      # Pixel 6 @ API 33 is a solid modern representative that exercises the real
      # MediaCodec stack Kompressor consumers will hit.
      - name: Run on Firebase Test Lab (Pixel 6 API 33)
        env:
          RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          gcloud firebase test android run \
            --type instrumentation \
            --project kompressor-library \
            --app "${{ steps.apk.outputs.path }}" \
            --test "${{ steps.apk.outputs.path }}" \
            --device model=oriole,version=33,locale=en,orientation=portrait \
            --timeout 15m \
            --no-record-video \
            --no-performance-metrics \
            --results-bucket test-lab-kompressor-ci \
            --results-dir "ci-${RUN_ID}" \
            --environment-variables coverage=true,coverageFile=/sdcard/coverage.ec \
            --directories-to-pull /sdcard

      # Download the JaCoCo `.ec` coverage file FTL pulled from `/sdcard/` so it can be
      # merged into the Kover report in a later iteration (see TODO in `kompressor/build.gradle.kts`
      # — unlocks raising the Kover gate from 85 → 90 % by covering device-only classes like
      # `AndroidAudioCompressor`, `AndroidVideoCompressor`, `Media3ExportRunner`).
      - name: Download FTL device coverage
        if: always()
        env:
          RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          mkdir -p build/ftl-coverage
          # FTL deposits the pulled artifacts under <results-dir>/<device-id>/artifacts/
          # `coverage.ec` keeps that exact filename.
          gcloud storage cp -r \
            "gs://test-lab-kompressor-ci/ci-${RUN_ID}/oriole-33-en-portrait/artifacts/coverage.ec" \
            build/ftl-coverage/ || echo "No coverage.ec produced (likely a validation-time failure)"
          ls -la build/ftl-coverage/ || true

      - name: Upload FTL coverage artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ftl-device-coverage
          path: build/ftl-coverage/
          if-no-files-found: warn

  # ── Merged coverage gate (host + FTL device) ────────────────
  # Runs *after* both `test` (host) and `android-device-tests-ftl` complete. Host tests are
  # fast-feedback and keep their own 85 % gate; this job merges the device `.ec` from FTL into
  # the Kover report and enforces a tighter 90 % bar that reflects the full combined coverage.
  #
  # Keeping the merge in a separate job (rather than serialising `test` after FTL) preserves
  # the fast-feedback property — you see host test results in ~3 min, iOS sim in ~2 min, and
  # only the merged-coverage gate waits on the 5-7 min FTL round-trip.
  merged-coverage:
    name: Merged coverage (host + device)
    runs-on: ubuntu-latest
    needs: [test, android-device-tests-ftl]
    # Don't fail the CI if FTL itself failed for a transient reason (quota, network) — device
    # coverage being missing is a lesser harm than blocking a merge on an unrelated infra issue.
    if: always() && needs.test.result == 'success'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 21
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}

      # `continue-on-error: true`: if FTL's upload step didn't run (quota hit, earlier
       # failure, cancelled workflow), the artifact won't exist. Tolerate that so this job
       # falls back to a host-only gate instead of blocking the merge on an infra hiccup.
      - name: Download FTL device coverage
        id: dl-ftl
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ftl-device-coverage
          path: ftl-coverage/

      - name: Place device .ec where Kover expects it
        id: place-coverage
        run: |
          # Kover wires JaCoCo coverage for androidDeviceTest via the
          # `enableCoverage = true` flag on `withDeviceTestBuilder`. The build normally writes
          # the .ec file to kompressor/build/outputs/code_coverage/connectedAndroidDeviceTest/
          # after `connectedAndroidDeviceTest` runs. Since FTL runs the tests remotely, we
          # drop the downloaded .ec in the same spot so `koverXmlReport` includes it in the
          # merged report on the next invocation.
          target_dir="kompressor/build/outputs/code_coverage/connectedAndroidDeviceTest"
          mkdir -p "$target_dir"
          if [ -f ftl-coverage/coverage.ec ]; then
            cp ftl-coverage/coverage.ec "$target_dir/connected-coverage.ec"
            echo "Merged: $(ls -la $target_dir)"
            echo "merged=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::No FTL coverage.ec — falling back to host-only gate."
            echo "merged=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Kover merged report
        run: ./gradlew :kompressor:koverXmlReport

      # Only run the tighter `-PkoverMergedGate=true` gate (90 %) when we actually have
      # device `.ec` merged — otherwise the flag trims exclusions without the coverage data
      # that justifies trimming them, and the job fails at ~52 % instead of ~90 %. Falling
      # back to the same host-only 85 % gate as the `test` job keeps the signal honest
      # without false-failing on infra issues.
      - name: Kover merged quality gate
        run: |
          if [ "${{ steps.place-coverage.outputs.merged }}" = "true" ]; then
            ./gradlew -PkoverMergedGate=true :kompressor:koverVerify
          else
            ./gradlew :kompressor:koverVerify
          fi

      - name: Upload merged Kover report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: kover-merged-report
          path: kompressor/build/reports/kover/

  # ── iOS simulator tests ──────────────────────────────────
  # Runs the Kotlin/Native simulator tests on every PR. macos-latest is arm64
  # with Xcode pre-installed; ~6-10 min per run. Same command is repeated in
  # release.yml:test-native as a belt-and-suspenders gate before publishing.
  ios-simulator-tests:
    name: iOS simulator tests
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 21
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.konan
          key: native-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
      - name: Run iOS simulator tests
        run: ./gradlew :kompressor:iosSimulatorArm64Test --stacktrace
      - name: Upload iOS test report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ios-simulator-test-report
          path: kompressor/build/reports/tests/iosSimulatorArm64Test/
