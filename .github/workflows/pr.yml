name: PR checks

on:
  pull_request:
    branches: [ main ]
    # Skip heavy CI for doc-only changes. GitHub treats path-skipped workflows
    # as "skipped" — which counts as success for branch-protection required
    # checks — so this is safe even with required-check rules configured.
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Ktlint ──────────────────────────────────────────────
  ktlint:
    name: Ktlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@d156388eb19639ec20ade50009f3d199ce1e2808 # v4.1.0
      - name: Run Ktlint
        run: ./gradlew ktlintCheck

  # ── Detekt ──────────────────────────────────────────────
  detekt:
    name: Detekt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@d156388eb19639ec20ade50009f3d199ce1e2808 # v4.1.0
      # `--no-configuration-cache`: Detekt's Gradle plugin currently can't serialise its
      # `__detektClasspath__` through Gradle 9.4's configuration cache and intermittently
      # fails with `error writing value of type 'DefaultConfigurableFileCollection'`. Until
      # the plugin gains support (see Detekt-gradle-plugin#7XXX), skip the cache for this
      # task only — the task itself is fast (< 1 min) so the cache wasn't buying us much.
      - name: Run Detekt
        run: ./gradlew detekt --no-configuration-cache
      - name: Upload Detekt report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: detekt-report
          path: build/reports/detekt/

  # ── Gitleaks ────────────────────────────────────────────
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ── Host tests, API check, coverage gate ─────────────────
  # Fast gate that runs on every PR without touching an emulator. Catches
  # regressions in commonTest + androidHostTest + public API in < 5 min.
  test:
    name: Tests & coverage (host)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@d156388eb19639ec20ade50009f3d199ce1e2808 # v4.1.0
      - name: Run tests (Android host)
        run: ./gradlew testAndroidHostTest
      - name: API binary compatibility check
        run: ./gradlew apiCheck
      - name: Run Kover report
        run: ./gradlew koverXmlReport
      - name: Kover — quality gate
        run: ./gradlew koverVerify
      - name: Upload Kover report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: kover-report
          path: kompressor/build/reports/kover/

  # ── Android device tests (Firebase Test Lab) ─────────────
  # Runs the 47 `androidDeviceTest` tests on a real Pixel 5 (API 33) at
  # Google's physical-device farm. Replaced the previous ubuntu-latest
  # emulator job which had structural codec limitations on x86_64 system
  # images (Media3 Transformer ignored setBitrate, produced PCM-in-MP4
  # fallback). Physical hardware runs the same MediaCodec stack Kompressor
  # consumers will, so the tests validate real-world behaviour.
  #
  # FTL free tier covers ~1 physical device-hour/day. Our suite runs in
  # ~5-7 min, so ~8-12 PRs/day are free; overage is ~$1/device-hour.
  android-device-tests-ftl:
    name: Android device tests (Firebase Test Lab — Pixel 6 API 33)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@d156388eb19639ec20ade50009f3d199ce1e2808 # v4.1.0

      - name: Assemble device-test APK
        run: ./gradlew :kompressor:assembleAndroidDeviceTest

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Locate test APK
        id: apk
        run: |
          APK=$(find kompressor/build/outputs/apk -type f -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "::error::No APK produced by assembleAndroidDeviceTest"
            exit 1
          fi
          echo "path=$APK" >> "$GITHUB_OUTPUT"
          echo "Found APK: $APK ($(du -h "$APK" | cut -f1))"

      # Invoke Firebase Test Lab. Same APK is passed to both --app and --test
      # because :kompressor: is a library module; AGP produces a single
      # self-instrumenting test APK that bundles AndroidJUnitRunner.
      #
      # --results-bucket: we use a bucket we created and IAM-bound explicitly
      # (`test-lab-kompressor-ci`) rather than FTL's auto-generated bucket.
      # The auto-bucket is created with the FTL service's IAM, not our SA's,
      # leading to `403 storage.objects.create denied` on upload. An explicit
      # bucket with `storage.objectAdmin` granted to the admin-SDK SA sidesteps
      # that entirely.
      # Device choice: `oriole` (Pixel 6) because `redfin` (Pixel 5) is not available
      # at API 33 on FTL — the model/version matrix only supports redfin up to API 31.
      # Pixel 6 @ API 33 is a solid modern representative that exercises the real
      # MediaCodec stack Kompressor consumers will hit.
      # Coverage emission: we want JaCoCo's `coverage.ec` to land somewhere that is
      #   (a) writable by the app process (no storage permissions on the test APK, target SDK 36
      #       rules out arbitrary /sdcard writes via scoped storage);
      #   (b) pullable by FTL via `--directories-to-pull` (only /sdcard, /storage, /data/local/tmp
      #       are supported).
      # The only intersection is the app-scoped external files dir:
      # `/sdcard/Android/data/<pkg>/files/`. It's not auto-created for an instrumentation-only
      # APK install — `AACoverageBootstrapTest` (androidDeviceTest sources) runs first
      # alphabetically and calls `getExternalFilesDir(null)` which creates the directory before
      # `instrumentationRunFinished` dumps coverage. Using a `@BeforeClass`-style bootstrap
      # test rather than a custom `AndroidJUnitRunner` because AGP's KMP Android library
      # plugin overwrites any `<instrumentation>` declared in the test manifest with its
      # auto-generated default — the custom-runner path is unreachable.
      - name: Run on Firebase Test Lab (Pixel 6 API 33)
        env:
          RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          gcloud firebase test android run \
            --type instrumentation \
            --project kompressor-library \
            --app "${{ steps.apk.outputs.path }}" \
            --test "${{ steps.apk.outputs.path }}" \
            --device model=oriole,version=33,locale=en,orientation=portrait \
            --timeout 15m \
            --no-record-video \
            --no-performance-metrics \
            --results-bucket test-lab-kompressor-ci \
            --results-dir "ci-${RUN_ID}" \
            --environment-variables coverage=true,coverageFile=/sdcard/Android/data/co.crackn.kompressor.test/files/coverage.ec \
            --directories-to-pull /sdcard/Android/data/co.crackn.kompressor.test/files

      # FTL preserves the full absolute path under `artifacts/` — empirically `/sdcard/...`
      # lands as `artifacts/sdcard/...`. (Earlier comments claimed the `/sdcard` prefix was
      # stripped; dumping the bucket after a successful run showed it isn't.) Copy the file to
      # a flat `build/ftl-coverage/coverage.ec` so the downstream merged-coverage job doesn't
      # need to know the path shape. Fails fast with a proper error annotation if the pull
      # fails — the previous `|| echo …` pattern swallowed the gcloud error and left the
      # downstream `upload-artifact` step to surface an opaque "No files were found".
      - name: Download FTL device coverage
        if: always()
        env:
          RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          mkdir -p build/ftl-coverage
          COV_PATH="gs://test-lab-kompressor-ci/ci-${RUN_ID}/oriole-33-en-portrait/artifacts/sdcard/Android/data/co.crackn.kompressor.test/files/coverage.ec"
          if ! gcloud storage cp "$COV_PATH" build/ftl-coverage/coverage.ec; then
            echo "::error::No coverage.ec produced at $COV_PATH — FTL may have failed before the coverage dump, or AACoverageBootstrapTest did not run."
            exit 1
          fi
          ls -la build/ftl-coverage/

      # `if-no-files-found: error`: when FTL's device-side JaCoCo emission fails to produce
      # the coverage file at `/sdcard/Android/data/<pkg>/files/coverage.ec`, fail here where
      # the root cause is obvious instead of letting the downstream `merged-coverage` job fail
      # later with a cryptic "Artifact not found".
      - name: Upload FTL coverage artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ftl-device-coverage
          path: build/ftl-coverage/
          if-no-files-found: error

  # ── Merged coverage gate (host + FTL device) ────────────────
  # Runs *after* both `test` (host) and `android-device-tests-ftl` complete. Host tests are
  # fast-feedback and keep their own 85 % gate; this job merges the device `.ec` from FTL into
  # the Kover report and enforces a tighter 90 % bar that reflects the full combined coverage.
  #
  # Keeping the merge in a separate job (rather than serialising `test` after FTL) preserves
  # the fast-feedback property — you see host test results in ~3 min, iOS sim in ~2 min, and
  # only the merged-coverage gate waits on the 5-7 min FTL round-trip.
  merged-coverage:
    name: Merged coverage (host + device)
    runs-on: ubuntu-latest
    needs: [test, android-device-tests-ftl]
    # Hard gate: requires both host tests AND FTL device tests to have succeeded. If FTL is
    # quota-blocked or transiently failing the gate fails — by design. The user explicitly
    # chose this trade-off ("no shortcut, going to prod") because a soft fallback would let
    # coverage regressions slip through under FTL incidents. To unblock a release during a
    # confirmed FTL outage, gate the PR via repository administrator override rather than
    # weakening the workflow.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@d156388eb19639ec20ade50009f3d199ce1e2808 # v4.1.0

      # No `continue-on-error`: if the FTL upload step didn't run, this download fails, the
      # job fails, and the merge is blocked. Honest signal beats a soft fallback that hides
      # coverage regressions during infra incidents.
      - name: Download FTL device coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ftl-device-coverage
          path: ftl-coverage/

      - name: Place device .exec where Kover expects it
        run: |
          # Kover's Android variant locator only ingests `AndroidUnitTest`-subclass test tasks,
          # so `connectedAndroidDeviceTest`'s coverage file is NOT auto-merged. The module's
          # build.gradle.kts adds a reflection-based injection (`afterEvaluate {}`) that appends
          # any `.exec` at `build/kover/bin-reports/connectedAndroidDeviceTest.exec` to Kover's
          # artifact-generation task. We drop the FTL-pulled file there so that injection picks
          # it up on `koverXmlReport` / `koverVerify`.
          target_dir="kompressor/build/kover/bin-reports"
          mkdir -p "$target_dir"
          if [ ! -f ftl-coverage/coverage.ec ]; then
            echo "::error::FTL device coverage.ec missing — cannot enforce the merged 90% gate."
            exit 1
          fi
          cp ftl-coverage/coverage.ec "$target_dir/connectedAndroidDeviceTest.exec"
          echo "Merged device coverage placed at $target_dir/connectedAndroidDeviceTest.exec"
          ls -la "$target_dir"

      - name: Run Kover merged report
        run: ./gradlew -PkoverMergedGate=true :kompressor:koverXmlReport

      # Root `koverVerify` already declares a task dependency on `:kompressor:koverVerify`
      # (and on `sample:koverVerify` — sample is excluded entirely so its gate always passes),
      # so invoking the single root task is equivalent to running both explicitly while keeping
      # the build-log output deduplicated.
      - name: Kover merged 90% gate (host + device)
        run: ./gradlew -PkoverMergedGate=true koverVerify

      - name: Upload merged Kover report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: kover-merged-report
          path: kompressor/build/reports/kover/

  # ── iOS simulator tests ──────────────────────────────────
  # Runs the Kotlin/Native simulator tests on every PR. macos-latest is arm64
  # with Xcode pre-installed; ~6-10 min per run. Same command is repeated in
  # release.yml:test-native as a belt-and-suspenders gate before publishing.
  ios-simulator-tests:
    name: iOS simulator tests
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@d156388eb19639ec20ade50009f3d199ce1e2808 # v4.1.0
      # Konan (Kotlin/Native) toolchain is not managed by setup-gradle; cache
      # separately so iOS sim tests don't re-download the compiler each run.
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('**/libs.versions.toml') }}
          restore-keys: |
            konan-${{ runner.os }}-
      - name: Run iOS simulator tests
        run: ./gradlew :kompressor:iosSimulatorArm64Test --stacktrace
      - name: Upload iOS test report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ios-simulator-test-report
          path: kompressor/build/reports/tests/iosSimulatorArm64Test/
