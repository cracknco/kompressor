name: PR checks

on:
  pull_request:
    branches: [ main ]
    # NOTE: no `paths-ignore` at the workflow level. The previous comment here
    # claimed GitHub treats workflow-level path-skipped runs as "skipped success"
    # for branch protection — that's only true for *job-level* skips. When a
    # workflow's `on:` filter decides not to trigger, no status is reported at
    # all and any required-check whose name matches one of this workflow's jobs
    # stays "Expected — Waiting for status" forever, blocking every doc-only PR
    # and every empty `feat(release):` trigger commit. Letting the 5 required
    # jobs run on every PR costs ~5 min of CI on doc PRs but removes the wedge.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Ktlint ──────────────────────────────────────────────
  ktlint:
    name: Ktlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
      - name: Run Ktlint
        run: ./gradlew ktlintCheck

  # ── Detekt ──────────────────────────────────────────────
  detekt:
    name: Detekt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
      # `--no-configuration-cache`: Detekt's Gradle plugin currently can't serialise its
      # `__detektClasspath__` through Gradle 9.4's configuration cache and intermittently
      # fails with `error writing value of type 'DefaultConfigurableFileCollection'`. Until
      # the plugin gains support (see Detekt-gradle-plugin#7XXX), skip the cache for this
      # task only — the task itself is fast (< 1 min) so the cache wasn't buying us much.
      - name: Run Detekt
        run: ./gradlew detekt --no-configuration-cache
      - name: Upload Detekt report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: detekt-report
          path: build/reports/detekt/

  # ── Raw-logging gate (CRA-47) ───────────────────────────
  # Second layer of defence over Detekt's ForbiddenImport (which catches
  # `android.util.Log` imports at build time). This script additionally flags
  # `NSLog(` — Kotlin/Native can't import it so Detekt doesn't see it — and
  # bare `println` / `print`. Runs in < 10 seconds on a checkout-only job,
  # so it's cheap to make required. See scripts/check-no-raw-logging.sh.
  # No user-controlled inputs are interpolated into any `run:` block.
  no-raw-logging:
    name: No raw logging in library
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Scan kompressor/src for raw logging calls
        run: ./scripts/check-no-raw-logging.sh

  # ── Dokka build (PR-time doc gate) ──────────────────────
  # Catch Dokka regressions at PR time instead of waiting for the next release.
  # Before this gate the only Dokka build happened in `publish-dokka.yml` on
  # `release: published` — a PR that broke KDoc resolution, introduced a
  # dangling `@property`, or removed an `@ExperimentalKompressorApi` badge
  # would only surface when semantic-release cut the next version and the
  # gh-pages publish silently 404'd. Running the same command here flips the
  # signal to "red check at PR" vs. "missing docs after merge".
  #
  # Hard-codes `-Pversion=pr-check` because the actual release version is only
  # known to semantic-release — we don't care about the footer text, we care
  # that the HTML build succeeds. `--no-configuration-cache` mirrors the flag
  # the release workflow uses (see issue #127 for the removal plan).
  dokka-build:
    name: Dokka build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
      - name: Build Dokka HTML
        run: ./gradlew :kompressor:dokkaGeneratePublicationHtml -Pversion=pr-check --no-configuration-cache

  # ── Gitleaks ────────────────────────────────────────────
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ── Host tests, API check, coverage gate ─────────────────
  # Fast gate that runs on every PR without touching an emulator. Catches
  # regressions in commonTest + androidHostTest + public API in < 5 min.
  test:
    name: Tests & coverage (host)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          lfs: true
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
      - name: Cache test fixtures
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: fixtures
          key: fixtures-${{ hashFiles('fixtures/manifest.json') }}
          restore-keys: |
            fixtures-
      - name: Fetch test fixtures
        run: ./scripts/fetch-fixtures.sh
      - name: Run tests (Android host)
        run: ./gradlew testAndroidHostTest
      # The `test` job compiles `:kompressor` transitively but does NOT exercise `:sample`.
      # A library API change that silently breaks the sample's compile (e.g. a rename reaches
      # the sample consumer without a corresponding doc/viewmodel update) used to pass CI
      # unnoticed until the next person ran `./gradlew build` locally. This step closes that
      # gap for the Android flavour of the sample on the runner that already has the toolchain.
      - name: Sample Android compile gate
        run: ./gradlew :sample:compileDebugKotlinAndroid
      # BCV's `apiCheck` already exits non-zero on ABI drift. The wrapper below turns that
      # into a GitHub-annotated error so the PR's Files-Changed view shows one actionable line
      # ("Run `./gradlew apiDump` and commit …") right next to the red check, instead of the
      # reviewer having to expand the logs to find the Gradle diff. No `continue-on-error`:
      # the step must still fail the job — the annotation only augments the signal.
      # Message is a hardcoded static string — no `github.event.*` interpolation — so there
      # is no injection surface (cf. the security-reminder hook on workflow edits).
      - name: API binary compatibility check
        run: |
          set -e
          if ! ./gradlew apiCheck; then
            echo "::error title=ABI baseline drift::Public ABI diverged from kompressor/api/kompressor.api. Run \`./gradlew apiDump\` and commit the result if intentional. See docs/api-stability.md for the S/E/I review checklist."
            exit 1
          fi
      - name: Run Kover report
        run: ./gradlew koverXmlReport
      - name: Kover — quality gate
        run: ./gradlew koverVerify
      - name: Upload Kover report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: kover-report
          path: kompressor/build/reports/kover/

  # ── iOS simulator tests ──────────────────────────────────
  # Runs the Kotlin/Native simulator tests on every PR. macos-latest is arm64
  # with Xcode pre-installed; ~6-10 min per run. Same command is repeated in
  # release.yml:test-native as a belt-and-suspenders gate before publishing.
  ios-simulator-tests:
    name: iOS simulator tests
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          lfs: true
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
      - name: Cache test fixtures
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: fixtures
          key: fixtures-${{ hashFiles('fixtures/manifest.json') }}
          restore-keys: |
            fixtures-
      - name: Fetch test fixtures
        run: ./scripts/fetch-fixtures.sh
      # Konan (Kotlin/Native) toolchain is not managed by setup-gradle; cache
      # separately so iOS sim tests don't re-download the compiler each run.
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('**/libs.versions.toml') }}
          restore-keys: |
            konan-${{ runner.os }}-
      - name: Run iOS simulator tests
        run: ./gradlew :kompressor:iosSimulatorArm64Test --stacktrace
      # Same rationale as the Android sample compile gate in the `test` job: a library change
      # that breaks `:sample`'s iOS target must fail CI, not the next local build. Piggybacks
      # on the macos-latest runner that already has the Kotlin/Native + Xcode toolchain.
      - name: Sample iOS simulator compile gate
        run: ./gradlew :sample:compileKotlinIosSimulatorArm64
      - name: Upload iOS test report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ios-simulator-test-report
          path: kompressor/build/reports/tests/iosSimulatorArm64Test/
