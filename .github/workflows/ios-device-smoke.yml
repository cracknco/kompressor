name: iOS device smoke tests (Firebase Test Lab)

on:
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MOBILE_CI_BUDGET_MONTH: ${{ vars.MOBILE_CI_BUDGET_MONTH || '25' }}

jobs:
  # ── iOS device smoke tests (Firebase Test Lab — iPhone 16 Pro iOS 18) ──
  #
  # Runs HDR10 HEVC + 5.1/7.1 surround AAC round-trip tests on a real
  # iPhone via FTL. These code paths crash or silently fail on the iOS
  # simulator (NSException for HEVC Main10, VTAACEncoder gate for multi-
  # channel AAC), so physical hardware is the only reliable signal.
  #
  # FTL iOS free tier covers ~5 physical device-tests/day. Our suite of 3
  # tests runs in ~3-5 min, well within the quota for normal PR volume.
  # Overage is billed at ~$5/device-hour.
  #
  # Hard-fail by design: no `continue-on-error`. If FTL is unavailable,
  # the PR is blocked — use repository admin override for confirmed outages
  # rather than weakening the gate. Rachid explicitly mandated this.
  ios-device-smoke:
    name: iOS device smoke (FTL)
    runs-on: macos-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          lfs: true

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@748248ddd2a24f49513d8f472f81c3a07d4d50e1 # v4.4.4

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('**/libs.versions.toml') }}
          restore-keys: |
            konan-${{ runner.os }}-

      - name: Build KMP framework (iosArm64)
        run: ./gradlew :kompressor:linkReleaseFrameworkIosArm64

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: iosDeviceSmokeTests
        run: xcodegen generate

      - name: Build for testing (arm64 device)
        working-directory: iosDeviceSmokeTests
        run: |
          xcodebuild build-for-testing \
            -project KompressorDeviceSmokeTests.xcodeproj \
            -scheme SmokeTests \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_PREVIEWS=NO

      - name: Package test artifacts for FTL
        id: package
        run: |
          cd iosDeviceSmokeTests/build/Build/Products
          XCTESTRUN=$(find . -name '*.xctestrun' -maxdepth 1 | head -1)
          if [ -z "$XCTESTRUN" ]; then
            echo "::error::No .xctestrun file found"
            exit 1
          fi

          # Remove Xcode Previews dylib — FTL re-signing doesn't handle it.
          find Debug-iphoneos -name '__preview.dylib' -delete
          find Debug-iphoneos -name '*.dSYM' -type d -exec rm -rf {} + 2>/dev/null || true

          zip -r "${GITHUB_WORKSPACE}/ios-smoke-tests.zip" \
            "${XCTESTRUN}" \
            Debug-iphoneos/*.app
          echo "zip=${GITHUB_WORKSPACE}/ios-smoke-tests.zip" >> "${GITHUB_OUTPUT}"
          ls -lh "${GITHUB_WORKSPACE}/ios-smoke-tests.zip"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Discover FTL iOS device catalog
        id: device
        run: |
          echo "::group::Available iPhone models"
          gcloud firebase test ios models list --project kompressor-library \
            --filter="name~iPhone" --format="table(modelId,name,supportedVersionIds)" 2>/dev/null || true
          echo "::endgroup::"

          echo "::group::Available Xcode versions"
          gcloud firebase test ios versions list --project kompressor-library 2>/dev/null || true
          echo "::endgroup::"

          # Pick the best available device (A10+ for HEVC Main10).
          # iPhone SE 3 (A15) is most reliable; 16 Pro pool has persistent issues.
          for MODEL in iphonese3 iphone14pro iphone16pro iphone11pro; do
            VERSION=$(gcloud firebase test ios models describe "$MODEL" \
              --project kompressor-library \
              --format="value(supportedVersionIds.flatten())" 2>/dev/null \
              | tr ';' '\n' | sort -rV | head -1)
            if [ -n "$VERSION" ]; then
              echo "model=$MODEL" >> "$GITHUB_OUTPUT"
              echo "version=$VERSION" >> "$GITHUB_OUTPUT"
              echo "Selected device: $MODEL @ iOS $VERSION"
              break
            fi
          done

      # Device must be A10+ for HEVC Main10 + multi-channel AAC.
      - name: Run on Firebase Test Lab
        env:
          RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
          TEST_ZIP: ${{ steps.package.outputs.zip }}
          FTL_MODEL: ${{ steps.device.outputs.model || 'iphonese3' }}
          FTL_VERSION: ${{ steps.device.outputs.version || '18.4' }}
        run: |
          echo "Running on $FTL_MODEL @ iOS $FTL_VERSION"
          gcloud firebase test ios run \
            --type xctest \
            --test "${TEST_ZIP}" \
            --device "model=${FTL_MODEL},version=${FTL_VERSION}" \
            --project kompressor-library \
            --results-bucket test-lab-kompressor-ci \
            --results-dir "ios-smoke-${RUN_ID}" \
            --timeout 15m \
            --no-record-video \
            --num-flaky-test-attempts 1

      - name: Download FTL test results
        if: always()
        env:
          RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          mkdir -p ftl-results
          echo "::group::GCS bucket contents"
          gcloud storage ls -r "gs://test-lab-kompressor-ci/ios-smoke-${RUN_ID}/" 2>/dev/null || true
          echo "::endgroup::"
          gcloud storage cp -r \
            "gs://test-lab-kompressor-ci/ios-smoke-${RUN_ID}/" \
            ftl-results/ || echo "::warning::Could not download FTL results"
          echo "::group::FTL results listing"
          find ftl-results -type f 2>/dev/null || true
          echo "::endgroup::"
          for log in $(find ftl-results -name '*.log' -o -name 'syslog' 2>/dev/null); do
            echo "::group::$log (last 200 lines)"
            tail -200 "$log" 2>/dev/null || true
            echo "::endgroup::"
          done
          for xml in $(find ftl-results -name '*.xml' 2>/dev/null); do
            echo "::group::$xml"
            cat "$xml" 2>/dev/null || true
            echo "::endgroup::"
          done

      - name: Upload JUnit XML results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ios-device-smoke-results
          path: ftl-results/
          if-no-files-found: warn

      - name: Budget check
        if: always()
        env:
          BUDGET_CAP: ${{ env.MOBILE_CI_BUDGET_MONTH }}
        run: |
          echo "::notice::iOS device CI budget cap: \$${BUDGET_CAP}/month. Monitor at https://console.cloud.google.com/billing"
