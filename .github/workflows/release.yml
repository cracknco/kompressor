name: Release

on:
  push:
    branches: [ main ]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:

  # ── GitHub Release (semantic-release) ────────────────────
  # CRA-85: the previous `test-native` job that re-ran `iosSimulatorArm64Test`
  # ahead of this one was removed. Branch protection on `main` + required PR +
  # required `pr.yml:ios-simulator-tests` status guarantee that the SHA which
  # lands on `main` — and therefore triggers this workflow — already passed iOS
  # sim tests at PR merge time. Re-running them on the same commit added zero
  # signal at a cost of ~6–10 min per release. See `docs/ci-benchmarks.md`.
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: true
      - name: Semantic release
        id: semantic
        uses: cycjimmy/semantic-release-action@b12c8f6015dc215fe37bc154d4ad456dd3833c90 # v6.0.0
        with:
          extra_plugins: |
            conventional-changelog-conventionalcommits@8
            @semantic-release/changelog@6
            @semantic-release/git@10
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Publication Maven Central ────────────────────────────
  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: [ release ]
    if: needs.release.outputs.new_release_published == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
      # `--no-configuration-cache`: the `com.vanniktech.maven.publish` plugin (0.36.0)
      # still cannot serialise its signing config through Gradle 9.4's configuration
      # cache. CLAUDE.md documents this incompatibility; CRA-85 re-validated the
      # status against 0.36.0 and the limitation persists. The flag is retained for
      # this single task only — every other Gradle invocation in the repo benefits
      # from `org.gradle.configuration-cache=true` (gradle.properties).
      - name: Publish to Maven Central
        run: ./gradlew publishToMavenCentral --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_version: ${{ needs.release.outputs.new_release_version }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.OSSRH_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.OSSRH_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PWD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
