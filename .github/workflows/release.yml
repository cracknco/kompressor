name: Release

on:
  push:
    branches: [ main ]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:

  # ── Verify iOS sim tests passed for this SHA ─────────────
  # CRA-85: replaces the removed `test-native` job. Instead of re-running
  # `iosSimulatorArm64Test` on `macos-latest` (~6–10 min) we query the GitHub
  # check-runs API for the SHA that triggered this workflow and assert that
  # the `iOS simulator tests` check from `pr.yml` already succeeded on it.
  # That check ran at PR merge time on the same commit; re-executing it would
  # spend macOS minutes for the same signal. The branch-protection rule on
  # `main` is the *intended* canonical gate, but this job enforces the same
  # invariant *inside* the release pipeline so the safety doesn't depend on
  # an admin-side setting that's invisible from the repo.
  #
  # Runs in ~10 s on `ubuntu-latest`. See `docs/ci-benchmarks.md` § 1.
  verify-ios-sim-passed:
    name: Verify iOS sim tests passed for this SHA
    runs-on: ubuntu-latest
    permissions:
      checks: read
    steps:
      - name: Assert iOS simulator tests succeeded on ${{ github.sha }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        # Picks the latest completed `iOS simulator tests` check-run on the SHA
        # (sorted by completed_at to handle re-runs) and reads its conclusion.
        # `// "missing"` falls through to a helpful error when the check never
        # ran for this commit (admin direct-push, force-push, branch-protection
        # disabled). No user-controlled input reaches the shell — `$SHA` and
        # `$GH_REPO` come from `github.*` context, not from PR/comment bodies.
        run: |
          set -euo pipefail
          conclusion=$(gh api "repos/${GH_REPO}/commits/${SHA}/check-runs" \
            --paginate \
            --jq '[.check_runs[] | select(.name == "iOS simulator tests" and .status == "completed")] | sort_by(.completed_at) | last | .conclusion // "missing"')
          echo "iOS simulator tests on ${SHA}: ${conclusion}"
          if [ "${conclusion}" != "success" ]; then
            echo "::error title=iOS sim gate not satisfied::Latest 'iOS simulator tests' check-run on ${SHA} is '${conclusion}' (expected 'success'). Refusing to publish. If branch protection is enabled this is unreachable; if you see it, branch protection on 'main' was bypassed and the PR-time iOS sim gate was skipped."
            exit 1
          fi

  # ── GitHub Release (semantic-release) ────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [ verify-ios-sim-passed ]
    permissions:
      contents: write
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: true
      - name: Semantic release
        id: semantic
        uses: cycjimmy/semantic-release-action@b12c8f6015dc215fe37bc154d4ad456dd3833c90 # v6.0.0
        with:
          extra_plugins: |
            conventional-changelog-conventionalcommits@8
            @semantic-release/changelog@6
            @semantic-release/git@10
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Publication Maven Central ────────────────────────────
  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: [ release ]
    if: needs.release.outputs.new_release_published == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
      # `--no-configuration-cache`: the `com.vanniktech.maven.publish` plugin (0.36.0)
      # still cannot serialise its signing config through Gradle 9.4's configuration
      # cache. CLAUDE.md documents this incompatibility; CRA-85 re-validated the
      # status against 0.36.0 and the limitation persists. The flag is retained for
      # this single task only — every other Gradle invocation in the repo benefits
      # from `org.gradle.configuration-cache=true` (gradle.properties).
      - name: Publish to Maven Central
        run: ./gradlew publishToMavenCentral --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_version: ${{ needs.release.outputs.new_release_version }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.OSSRH_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.OSSRH_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PWD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
