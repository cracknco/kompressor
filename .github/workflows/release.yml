name: Release

on:
  push:
    branches: [ main ]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:

  # ── Tests Native (macOS uniquement sur main) ─────────────
  test-native:
    name: Tests Native
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
      # Konan (Kotlin/Native) toolchain is not managed by setup-gradle; cache
      # separately so iOS sim tests don't re-download the compiler each run.
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('**/libs.versions.toml') }}
          restore-keys: |
            konan-${{ runner.os }}-
      - name: Run tests (iOS simulator)
        run: ./gradlew :kompressor:iosSimulatorArm64Test

  # ── GitHub Release (semantic-release) ────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [ test-native ]
    permissions:
      contents: write
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: true
      - name: Semantic release
        id: semantic
        uses: cycjimmy/semantic-release-action@b12c8f6015dc215fe37bc154d4ad456dd3833c90 # v6.0.0
        with:
          extra_plugins: |
            conventional-changelog-conventionalcommits@8
            @semantic-release/changelog@6
            @semantic-release/git@10
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── SPDX license report (release asset) ──────────────────
  spdx-report:
    name: SPDX license report
    runs-on: ubuntu-latest
    needs: [ release ]
    if: needs.release.outputs.new_release_published == 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
      - name: Generate license report
        run: ./gradlew generateLicenseReport --no-configuration-cache
      - name: Generate SPDX document
        env:
          VERSION: ${{ needs.release.outputs.new_release_version }}
        run: ./scripts/generate-spdx.sh
      - name: Upload SPDX to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.release.outputs.new_release_version }}
        run: gh release upload "v${VERSION}" build/reports/dependency-license/kompressor-spdx.json

  # ── CycloneDX SBOM (release asset) ───────────────────────
  # CRA-27 — supply-chain transparency for US EO 14028 / EU Cyber Resilience Act. The published
  # asset `kompressor-x.y.z.sbom.json` is the authoritative CycloneDX 1.5 SBOM for the Maven
  # Central artifact and is what consumers ingest into Dependency-Track / audit with syft.
  sbom:
    name: CycloneDX SBOM
    runs-on: ubuntu-latest
    needs: [ release ]
    if: needs.release.outputs.new_release_published == 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
      - name: Generate SBOM
        # `-PsbomVersion=...` stamps the SBOM's `metadata.component.version` with the authoritative
        # semantic-release version so `syft packages maven-central:...:x.y.z` reproducibility
        # comparisons line up. We can't use `ORG_GRADLE_PROJECT_version` because the `:kompressor`
        # build script re-assigns `version` to a literal at configuration time — same constraint
        # the SPDX job works around via its `$VERSION` env var. `--no-configuration-cache`
        # mirrors the SPDX job because AGP is not config-cache-compatible in this project.
        env:
          VERSION: ${{ needs.release.outputs.new_release_version }}
        run: ./gradlew :kompressor:cyclonedxBom --no-configuration-cache "-PsbomVersion=${VERSION}"
      - name: Rename SBOM with version suffix
        env:
          VERSION: ${{ needs.release.outputs.new_release_version }}
        run: cp kompressor/build/reports/bom.json "kompressor-${VERSION}.sbom.json"
      - name: Upload SBOM to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.release.outputs.new_release_version }}
        run: gh release upload "v${VERSION}" "kompressor-${VERSION}.sbom.json"

  # ── Publication Maven Central ────────────────────────────
  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: [ release ]
    if: needs.release.outputs.new_release_published == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 21
      - uses: ruby/setup-ruby@e65c17d16e57e481586a6a5a0282698790062f92 # v1
        with:
          ruby-version: '4.0.2'
          bundler-cache: true
      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
      - name: Publish to Maven Central
        run: bundle exec fastlane publish
        env:
          ORG_GRADLE_PROJECT_version: ${{ needs.release.outputs.new_release_version }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.OSSRH_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.OSSRH_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PWD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
