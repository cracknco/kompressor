name: Publish Dokka

# Publishes the Kompressor API reference (Dokka HTML) to the `gh-pages` branch
# under two stable URLs per release:
#   - https://cracknco.github.io/kompressor/api/<version>/  (immutable archive)
#   - https://cracknco.github.io/kompressor/api/latest/     (alias to newest)
#
# Triggered automatically when `release.yml` publishes a GitHub Release (via
# `semantic-release`). Also exposes `workflow_dispatch` so a docs-only fix can
# be re-published for an existing version without cutting a new library release.
#
# Security note: every external input (`inputs.version`, `github.event.release.*`)
# is passed through an `env:` block and validated against a strict regex in bash
# rather than interpolated directly into `run:` scripts — see the workflow-injection
# pattern documented at
# https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/

on:
  release:
    types: [ published ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish docs under (e.g. 1.2.3). Defaults to the latest release tag.'
        required: false
        type: string
      update_latest:
        description: 'Also update /api/latest/ alias. Disable for back-porting docs to an older release.'
        required: false
        type: boolean
        default: true

# Serialise Dokka publishes — concurrent pushes to `gh-pages` race each other and
# the first loser has to retry. `cancel-in-progress: false` because the currently
# running job is publishing a real release we do not want to drop on the floor.
concurrency:
  group: publish-dokka
  cancel-in-progress: false

jobs:
  publish:
    name: Build & deploy Dokka to gh-pages
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      # Resolve the target version + the Git ref to check out BEFORE `actions/checkout`
      # so that back-fill runs (`workflow_dispatch` with `inputs.version=X.Y.Z`) generate
      # Dokka from the code that was actually released at X.Y.Z rather than from current
      # `main`. On `release: published`, `github.ref` already points at the tag so the
      # behaviour is unchanged.
      - name: Resolve target version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          if [[ -n "${INPUT_VERSION}" ]]; then
            resolved="${INPUT_VERSION}"
          elif [[ -n "${RELEASE_TAG}" ]]; then
            resolved="${RELEASE_TAG}"
          else
            echo "::error::Neither workflow_dispatch input nor release tag_name is set."
            exit 1
          fi
          # semantic-release cuts tags like `v1.2.3`; strip the leading `v` so the URL
          # is `/api/1.2.3/` rather than `/api/v1.2.3/`.
          resolved="${resolved#v}"
          # Defensive guards against path traversal, shell metachars, and pathologically long
          # tag names. Real semver tags (`1.2.3`, `1.0.0-rc.4+build.99`) never exceed ~30 chars;
          # 64 is generous enough to absorb odd build-metadata suffixes without letting a crafted
          # release name explode `api/${VERSION}/` into a filesystem hazard.
          if [[ ${#resolved} -gt 64 ]]; then
            echo "::error::Refusing to publish docs for an over-long version string (${#resolved} chars, max 64)."
            exit 1
          fi
          if ! [[ "${resolved}" =~ ^[A-Za-z0-9._+-]+$ ]]; then
            echo "::error::Refusing to publish docs for version '${resolved}' — only [A-Za-z0-9._+-] is allowed."
            exit 1
          fi
          echo "version=${resolved}" >> "$GITHUB_OUTPUT"
          echo "ref=v${resolved}" >> "$GITHUB_OUTPUT"
          echo "Publishing Dokka for version: ${resolved} (checkout ref: v${resolved})"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # Check out the release tag explicitly so back-fill runs (`workflow_dispatch`
          # with `inputs.version=X.Y.Z`) generate Dokka from the code as it existed at
          # that release, not from whatever `main` looks like at back-fill time. On the
          # `release: published` trigger this resolves to the same tag that
          # `github.event.release.tag_name` points at, so behaviour is identical.
          ref: ${{ steps.version.outputs.ref }}
          # Need full history so we can add the `gh-pages` branch as a worktree
          # rather than re-cloning into a temp dir.
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Generate Dokka HTML
        env:
          # Resolved (and regex-validated) version from the previous step. Passing it
          # via `env:` avoids the shell-injection pattern caught by GitHub Actions
          # security guides.
          DOKKA_VERSION: ${{ steps.version.outputs.version }}
        # `-Pversion=...` overrides the module version baked into the generated pages
        # so the footer + search index reflect the released version rather than the
        # `0.1.0` placeholder hardcoded in `kompressor/build.gradle.kts`.
        # `-PsourceLinkRef=v<version>` pins every GitHub source-link anchor to the release
        # tag — without this, immutable `/api/<version>/` archives would silently drift as
        # `main` evolves (clicking a source link on v1.0.0 pages years later would land on
        # whatever `main` looks like then, not the v1.0.0 code).
        # `--no-configuration-cache` is kept as a precaution: the Dokka v2 Gradle plugin is
        # documented as config-cache-compatible, but its interaction with the Android KMP
        # plugin + vanniktech publishing hasn't been stress-tested on this repo. The runs
        # here are infrequent (one per release) so the cold-cache cost is negligible.
        # TODO: revisit this flag after a Dokka v2.2+ / Vanniktech 0.37+ bump lands on this
        # repo — verify a release with the flag removed, then drop it. Tracked follow-up in
        # the PR description and in `docs/ci/dokka-config-cache.md` if/when we pin it down.
        run: ./gradlew :kompressor:dokkaGeneratePublicationHtml "-Pversion=${DOKKA_VERSION}" "-PsourceLinkRef=v${DOKKA_VERSION}" --no-configuration-cache

      - name: Publish to gh-pages
        env:
          VERSION: ${{ steps.version.outputs.version }}
          UPDATE_LATEST: ${{ inputs.update_latest }}
        run: |
          set -euo pipefail

          # `inputs.update_latest` is only set on workflow_dispatch runs; on the
          # `release` trigger the variable is empty — `${VAR:-true}` handles both the
          # unset and empty-string cases.
          update_latest="${UPDATE_LATEST:-true}"

          src="kompressor/build/dokka/html"
          if [[ ! -d "${src}" ]]; then
            echo "::error::Dokka HTML output missing at ${src}. Did dokkaGeneratePublicationHtml fail silently?"
            exit 1
          fi

          # Bot identity matches the other auto-commit workflows in this repo so
          # audit logs stay consistent.
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'

          worktree="$(mktemp -d)"
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages --depth 1
            git worktree add "${worktree}" origin/gh-pages
            # Turn the detached HEAD into a proper `gh-pages` branch inside the worktree.
            # The eventual `git push origin HEAD:gh-pages` at the end of this step still works
            # from a detached HEAD (the remote ref is named explicitly), so a failure here is
            # functionally recoverable — but silently proceeding would hide real problems like
            # ref-corruption or a stale local branch on a re-used runner. Surface enough context
            # in the warning that a reviewer can diagnose the next occurrence without replaying
            # the run: the working-tree summary from the worktree itself.
            if ! (cd "${worktree}" && git switch -c gh-pages); then
              {
                echo "::warning::git switch -c gh-pages failed; proceeding from detached HEAD (push target is HEAD:gh-pages)."
                echo "::warning::Worktree status follows (for diagnosis):"
                (cd "${worktree}" && git status --short --branch) || true
              }
            fi
          else
            # First-time publish: create the orphan branch inline.
            git worktree add --no-checkout "${worktree}" HEAD
            (cd "${worktree}" && git checkout --orphan gh-pages && git rm -rf --quiet . || true)
          fi

          # Clean-and-copy the versioned directory so removed symbols disappear
          # from the reference instead of lingering as stale files.
          rm -rf "${worktree}/api/${VERSION}"
          mkdir -p "${worktree}/api/${VERSION}"
          cp -R "${src}/." "${worktree}/api/${VERSION}/"

          if [[ "${update_latest}" == "true" ]]; then
            rm -rf "${worktree}/api/latest"
            mkdir -p "${worktree}/api/latest"
            cp -R "${src}/." "${worktree}/api/latest/"
          else
            echo "Skipping /api/latest/ update (update_latest input disabled)."
          fi

          # `.nojekyll` keeps GitHub Pages from running the Jekyll pipeline over
          # Dokka's output — Jekyll eats files prefixed with `_` which Dokka uses
          # heavily for its own assets.
          touch "${worktree}/.nojekyll"

          cd "${worktree}"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes in generated docs; nothing to publish."
            exit 0
          fi
          git commit -m "docs(api): publish Dokka for ${VERSION}"
          git push origin HEAD:gh-pages
