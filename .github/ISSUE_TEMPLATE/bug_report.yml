name: Bug Report
description: Report a bug in Kompressor
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!
        Please fill out the sections below so we can reproduce and fix the issue.

  - type: input
    id: version
    attributes:
      label: Kompressor version
      description: The version of Kompressor where you found the bug.
      placeholder: "e.g. 1.0.0"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Which platform are you targeting?
      options:
        - Android
        - iOS
        - Both
    validations:
      required: true

  - type: input
    id: platform-version
    attributes:
      label: Platform version
      description: Android API level or iOS version.
      placeholder: "e.g. Android API 34 / iOS 17.4"
    validations:
      required: true

  - type: input
    id: device-model
    attributes:
      label: Device model
      description: Physical device or emulator/simulator.
      placeholder: "e.g. Pixel 8 Pro, iPhone 15 Simulator"
    validations:
      required: true

  - type: textarea
    id: repro-steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the bug.
      placeholder: |
        1. Call `Kompressor.compress(...)` with ...
        2. Pass config ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / stack trace
      description: Paste any relevant logs or crash traces.
      render: shell
    validations:
      required: false
