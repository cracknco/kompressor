name: KompressorDeviceSmokeTests
options:
  bundleIdPrefix: co.crackn.kompressor
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
settings:
  SWIFT_VERSION: "5.10"

targets:
  SmokeTestHost:
    type: application
    platform: iOS
    sources:
      - path: App
    info:
      path: App/Info.plist
      properties:
        UILaunchStoryboardName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.crackn.kompressor.devicetest
        CODE_SIGN_IDENTITY: "iPhone Developer"
        CODE_SIGNING_REQUIRED: "YES"
        FRAMEWORK_SEARCH_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)/../kompressor/build/bin/iosArm64/releaseFramework"
        OTHER_LDFLAGS:
          - "$(inherited)"
          - "-ObjC"
      configs:
        Release:
          CODE_SIGN_IDENTITY: "iPhone Developer"
    dependencies:
      - framework: ../kompressor/build/bin/iosArm64/releaseFramework/Kompressor.framework
        embed: false

  SmokeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    info:
      path: Tests/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.crackn.kompressor.devicetest.tests
        CODE_SIGNING_ALLOWED: "NO"
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGN_IDENTITY: ""
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/SmokeTestHost.app/SmokeTestHost"
        BUNDLE_LOADER: "$(TEST_HOST)"
        SWIFT_OBJC_BRIDGING_HEADER: Tests/BridgingHeader.h
        FRAMEWORK_SEARCH_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)/../kompressor/build/bin/iosArm64/releaseFramework"
    dependencies:
      - target: SmokeTestHost
