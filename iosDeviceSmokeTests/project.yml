name: KompressorDeviceSmokeTests
options:
  bundleIdPrefix: co.crackn.kompressor
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
settings:
  SWIFT_VERSION: "5.10"

targets:
  SmokeTestHost:
    type: application
    platform: iOS
    sources:
      - path: App
    info:
      path: App/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.crackn.kompressor.smoketesthost
        CODE_SIGN_IDENTITY: "iPhone Developer"
        CODE_SIGNING_REQUIRED: "YES"
        FRAMEWORK_SEARCH_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)/../kompressor/build/bin/iosArm64/releaseFramework"
      configs:
        Release:
          CODE_SIGN_IDENTITY: "iPhone Developer"
    dependencies:
      - framework: ../kompressor/build/bin/iosArm64/releaseFramework/Kompressor.framework
        embed: false

  SmokeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    info:
      path: Tests/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.crackn.kompressor.smoketests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/SmokeTestHost.app/SmokeTestHost"
        BUNDLE_LOADER: "$(TEST_HOST)"
        FRAMEWORK_SEARCH_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)/../kompressor/build/bin/iosArm64/releaseFramework"
    dependencies:
      - target: SmokeTestHost
      - framework: ../kompressor/build/bin/iosArm64/releaseFramework/Kompressor.framework
