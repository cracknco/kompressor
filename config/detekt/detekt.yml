comments:
  UndocumentedPublicClass:
    active: true
  UndocumentedPublicFunction:
    active: true
  UndocumentedPublicProperty:
    active: true

complexity:
  LongMethod:
    threshold: 30
  CyclomaticComplexMethod:
    threshold: 15
  TooManyFunctions:
    excludes:
      - "**/Kompressor.kt"

style:
  MagicNumber:
    active: false
  MaxLineLength:
    maxLineLength: 120
  WildcardImport:
    active: true
  # CRA-47: enforce that every library-side log goes through `KompressorLogger`.
  # `android.util.Log` (any member) is forbidden everywhere in `kompressor/src`
  # except the single `PlatformLogger.android.kt` actual that adapts the raw API
  # onto the logger contract. `ForbiddenImport` is AST-based, so it catches even
  # renamed imports (`import android.util.Log as Logcat`). This rule pairs with
  # `scripts/check-no-raw-logging.sh`, which also catches `NSLog(` (not
  # importable from Kotlin/Native, so Detekt can't see it) and bare `println`.
  ForbiddenImport:
    active: true
    excludes:
      - "**/PlatformLogger.android.kt"
      - "**/PlatformLogger.ios.kt"
      - "**/commonTest/**"
      - "**/androidHostTest/**"
      - "**/androidDeviceTest/**"
      - "**/iosTest/**"
      - "**/sample/**"
    imports:
      - value: "android.util.Log"
        reason: "Use co.crackn.kompressor.logging.KompressorLogger (see docs/logging.md). Only PlatformLogger.android.kt may import android.util.Log."

naming:
  FunctionNaming:
    active: true
  VariableNaming:
    active: true

# Typed-error taxonomy: extend `TooGenericExceptionThrown` to block untyped exception
# types from leaking out of public compress() APIs. Detekt's rule is AST-based and matches
# `throw <TypeName>(...)` expressions only — `kotlin.error(...)` / `kotlin.check(...)` and
# `require` / `check` remain valid for programmer-error contract violations, since platform
# wrappers that re-throw these are remapped to typed errors by `mapTo*Error()` helpers.
exceptions:
  TooGenericExceptionThrown:
    active: true
    exceptionNames:
      - Error
      - Exception
      - NullPointerException
      - RuntimeException
      - Throwable
      - IllegalStateException
      - IllegalArgumentException
