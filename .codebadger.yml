# CodeBadger (Joern CPG) configuration for Kompressor
# https://github.com/cracknco/kompressor
version: 1

# Paths excluded from analysis findings
exclude:
  - "**/test/**"
  - "**/androidHostTest/**"
  - "**/androidInstrumentedTest/**"
  - "**/iosTest/**"
  - "**/sample/**"
  # Format-support matrix: the `codecPath` fields are documentation-only strings that
  # mention "MediaCodec" / "BitmapFactory" / "AVAssetWriter" etc. by name. The Joern
  # `resource-leak` rule matches on identifier substrings and flags every row as a
  # false positive even though there is no actual codec usage in this file (it's a
  # pure `data class` catalogue consumed by a Markdown renderer). Per-line
  # suppressions would mean 14+ annotations on a single data-only file; a targeted
  # exclude is cleaner. CRA-43.
  - "**/matrix/FormatSupportMatrix.kt"

# Inline suppression settings
suppression:
  comment-prefix: "codebadger:suppress"
  allow-suppress-all: false

# Per-rule configuration
rules:
  resource-leak:
    enabled: true
  mediacodec-safe-release:
    enabled: true
  cfrelease-missing:
    enabled: true
  uigraphics-context-pairing:
    enabled: true
  cancellation-checkpoint-missing:
    enabled: true
  bare-runcatching:
    enabled: true
  continuation-incomplete:
    enabled: true
  allocation-in-loop:
    enabled: true
  taint-flow:
    enabled: false # No matching source patterns in codebase currently
  force-unwrap:
    enabled: true
